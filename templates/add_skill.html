{% extends 'base.html' %}{% set title='上架技能' %}{% block content %}<div class="card section">
    <h2>上架新技能</h2>
    <form method="post" class="form-grid">
        <div class="field"><label>技能標題</label><input name="title" required></div>
        <div class="field"><label>分類</label><select name="category_id">
                <option value="">選擇分類</option>{% for c in categories %}<option
                    value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
            </select></div>
        <div class="field"><label>類型</label><select name="type">
                <option value="offer">我可以教</option>
                <option value="learn">我想學</option>
            </select></div>
        <div class="field"><label>方式</label><select name="method">
                <option value="online">線上</option>
                <option value="offline">實體</option>
                <option value="both">皆可</option>
            </select></div>
        <div class="field"><label>地點</label><input name="location"></div>
        <div class="field"><label>可交換時間</label><input name="available_time"></div>
        <div class="field" style="grid-column:1/-1"><label>描述</label><textarea name="description" required></textarea>
        </div><button class="btn">送出</button>
    </form>
</div>{% endblock %}
