{% extends 'base.html' %}{% set title='聊天室' %}{% block content %}<section class="card section">
    <h2>聊天室：{{ match.skill.title }}</h2>
    <div class="chat-box">{% for msg in messages %}<div
            class="bubble {% if msg.sender_id==current_user.id %}me{% endif %}"><strong>{{ msg.sender.name
                                }}</strong><br>{{ msg.content }}<div class="kpi">{{ format_taiwan_time(msg.created_at, '%Y-%m-%d %H:%M') }}</div>
        </div>{% else %}<div class="empty">目前沒有訊息。</div>{% endfor %}</div>
        <form method="post" class="form-grid" style="margin-top:18px" id="chat-form">
        <div class="field" style="grid-column:1/-1"><label>輸入訊息</label><textarea name="content" required></textarea>
        </div><button class="btn">送出</button>
    </form>
        <script>
            (function() {
                const form = document.getElementById('chat-form');
                const textarea = form.querySelector('textarea[name="content"]');
                const button = form.querySelector('button[type="submit"], button.btn');

                let submitting = false;

                form.addEventListener('submit', function(event) {
                    if (submitting) {
                        event.preventDefault();
                        return;
                    }
                    submitting = true;
                    if (button) {
                        button.disabled = true;
                    }
                });

                textarea.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        if (!submitting) {
                            form.requestSubmit();
                        }
                    }
                });
            })();
        </script>
</section>{% endblock %}
