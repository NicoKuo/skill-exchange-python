{% extends 'base.html' %}{% set title='通知' %}{% block content %}<section class="card section">
    <h2>通知中心</h2>{% for item in items %}<div style="padding:12px 0;border-bottom:1px solid #e5e7eb"><span class="tag">{{
            item.type }}</span> {{ item.content }}<div class="kpi">{{ item.created_at.strftime('%Y-%m-%d %H:%M') }}
        </div>
    </div>{% else %}<div class="empty">目前沒有通知。</div>{% endfor %}
</section>{% endblock %}
